<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BooGIE calculator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.calculator{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:360px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.display{
  width:100%;
  height:70px;
  border:none;
  outline:none;
  background:#0f172a;
  color:white;
  font-size:2rem;
  text-align:right;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

button{
  height:60px;
  border:none;
  border-radius:12px;
  font-size:1rem;
  cursor:pointer;
  background:#334155;
  color:white;
  transition:0.2s;
}

button:hover{
  background:#475569;
  transform:scale(1.05);
}

.operator{
  background:#f59e0b;
}

.equal{
  background:#22c55e;
}

.clear{
  background:#ef4444;
}
</style>
</link rel="manifest" href="manifest.json">

<body>

<div class="calculator">
  <input type="text" id="display" class="display" readonly>

  <div class="buttons">

    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>
    <button onclick="append('Math.pow(')">xʸ</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>
    <button onclick="append('Math.sqrt(')">√</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>
    <button onclick="append('Math.log10(')">log</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="append('Math.PI')">π</button>
    <button class="equal" onclick="calculate()">=</button>
    <button onclick="append('Math.sin(')">sin</button>

    <button onclick="append('Math.cos(')">cos</button>
    <button onclick="append('Math.tan(')">tan</button>
    <button onclick="append('Math.E')">e</button>
    <button onclick="append('Math.exp(')">exp</button>
    <button onclick="append('%')">%</button>

  </div>
</div>

<script>

const display = document.getElementById("display");

function append(value){
  display.value += value;
}

function clearDisplay(){
  display.value = "";
}

function deleteLast(){
  display.value = display.value.slice(0,-1);
}

function calculate(){
  try{
    display.value = eval(display.value);
  }
  catch{
    display.value = "Error";
  }
}

</script>

</body>
</html>
